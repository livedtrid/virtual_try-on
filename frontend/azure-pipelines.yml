trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'

  - script: |
      if [ -f frontend/package-lock.json ] || [ -f frontend/package.json ]; then
        cd frontend
      fi
      npm ci
      npm run build
    displayName: Install dependencies and build frontend

