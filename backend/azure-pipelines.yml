trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.12'

  - script: |
      if [ -f backend/requirements.txt ]; then
        cd backend
      fi
      python -m pip install --upgrade pip
      pip install -r requirements.txt
      pytest -q
    displayName: Install dependencies and run pytest

